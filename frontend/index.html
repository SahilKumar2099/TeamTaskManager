<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManager — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">

            <div class="auth-header">
                <h1>📋 TaskManager</h1>
                <p>Manage tasks with your team</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="login()">Login</button>
                <p id="login-error" class="error-msg"></p>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Sahil Kumar">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="min 6 characters">
                </div>
                <button class="btn-primary" onclick="register()">Create Account</button>
                <p id="register-error" class="error-msg"></p>
            </div>

        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
